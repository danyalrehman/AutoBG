defaults:
  - default
  - net: causal_transformer
  - scheduler: cosine

_target_: src.models.autoregressive_module.AutoregressiveLitModule
mean_free_prior: True  # Kept for compatibility, not used in AR model

# Discretization settings
num_bins: 1024
discretize_min: -3.0
discretize_max: 3.0

# Sampling settings
temperature: 1.0
top_k: null  # Top-k sampling (null to disable)
top_p: null  # Nucleus sampling (null to disable)
use_mu_law: false  # Use mu-law discretization for better precision near zero
use_empirical_offsets: false  # Use data-driven within-bin offsets instead of uniform noise

# Training settings
label_smoothing: 0.0  # Reduces overconfidence, helps generalization

optimizer:
  _partial_: true
  lr: 5e-4
  betas:
    - 0.9
    - 0.999
  weight_decay: 0.01
ema_decay: 0.0

sampling_config:
  use_com_adjustment: False
  num_proposal_samples: 10_000
  num_test_proposal_samples: 200_000
  clip_reweighting_logits: 0.002