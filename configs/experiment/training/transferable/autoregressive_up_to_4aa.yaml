# @package _global_

defaults:
  - override /model: autoregressive
  - override /model/net: causal_transformer_large
  - override /data: transferable/up_to_4aa
  - override /trainer: gpu

model:
  num_bins: 8192
  discretize_min: -4.5
  discretize_max: 4.5
  temperature: 0.95 # optimal inference-time sampling temperature

  # Conditioning on atom type, residue type, residue position, and sequence length.
  net:
    use_global_cond: true
    add_cond_to_input: true
    cond_embed:
      use_atom_pos_embed: true

  optimizer:
    lr: 5e-4
    weight_decay: 0.01

  sampling_config:
    batch_size: 256
    num_proposal_samples: 0

data:
  batch_size: 512
  num_eval_samples: 5_000
  com_augmentation: False

trainer:
  limit_train_batches: 1000
  limit_val_batches: 0 # transferable training does not run the (sampling-based) eval
  limit_test_batches: null
  max_epochs: 500
  num_sanity_val_steps: 0
